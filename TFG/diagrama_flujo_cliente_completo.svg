<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="960" fill="#f8fafc"/>

  <!-- Título -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Flujo de acciones del cliente</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#64748b">Aplicación Android de control de kcal — navegación del usuario final</text>

  <!-- ===================== ACCESO ===================== -->
  <!-- Inicio -->
  <g filter="url(#soft)">
    <rect x="535" y="90" width="130" height="44" rx="22" ry="22" fill="#0f172a"/>
    <text x="600" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Inicio</text>
  </g>
  <line x1="600" y1="134" x2="600" y2="166" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Acceso -->
  <g filter="url(#soft)">
    <rect x="420" y="168" width="360" height="64" rx="10" ry="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="600" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Iniciar sesión / Registro</text>
    <text x="600" y="212" text-anchor="middle" font-size="11" fill="#64748b">Firebase Auth — si es primer acceso, configurar perfil</text>
    <text x="600" y="226" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">(edad, peso, altura, objetivo diario de kcal)</text>
  </g>
  <line x1="600" y1="232" x2="600" y2="262" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Pantalla principal (hub) -->
  <g filter="url(#soft)">
    <rect x="370" y="264" width="460" height="82" rx="12" ry="12" fill="url(#hubGrad)"/>
    <text x="600" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Pantalla principal (Dashboard)</text>
    <text x="600" y="314" text-anchor="middle" font-size="12" fill="#dbeafe">kcal consumidas · objetivo diario · kcal restantes · progreso</text>
    <text x="600" y="332" text-anchor="middle" font-size="11" fill="#bfdbfe" font-style="italic">punto central de navegación</text>
  </g>

  <!-- Distribuidor a 4 columnas -->
  <line x1="600" y1="346" x2="600" y2="376" stroke="#334155" stroke-width="1.8"/>
  <line x1="180" y1="376" x2="1020" y2="376" stroke="#334155" stroke-width="1.8"/>
  <line x1="180" y1="376" x2="180" y2="402" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="460" y1="376" x2="460" y2="402" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="740" y1="376" x2="740" y2="402" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="1020" y1="376" x2="1020" y2="402" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===================== ZONA 1: AÑADIR COMIDA ===================== -->
  <rect x="40" y="395" width="280" height="340" rx="12" ry="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <rect x="40" y="395" width="280" height="34" rx="12" ry="12" fill="#059669"/>
  <rect x="40" y="415" width="280" height="14" fill="#059669"/>
  <text x="180" y="417" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AÑADIR COMIDA</text>

  <!-- Box 1 -->
  <g filter="url(#soft)">
    <rect x="60" y="444" width="240" height="52" rx="8" ry="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.3"/>
    <text x="180" y="467" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">1. Buscar comida</text>
    <text x="180" y="484" text-anchor="middle" font-size="10" fill="#047857">Consulta a API (nombre en español)</text>
  </g>
  <line x1="180" y1="496" x2="180" y2="516" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <g filter="url(#soft)">
    <rect x="60" y="518" width="240" height="52" rx="8" ry="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.3"/>
    <text x="180" y="541" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">2. Ver detalles e indicar cantidad</text>
    <text x="180" y="558" text-anchor="middle" font-size="10" fill="#047857">kcal por 100 g · ración consumida</text>
  </g>
  <line x1="180" y1="570" x2="180" y2="590" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <g filter="url(#soft)">
    <rect x="60" y="592" width="240" height="52" rx="8" ry="8" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.3"/>
    <text x="180" y="615" text-anchor="middle" font-size="12" font-weight="600" fill="#064e3b">3. Clasificar ingesta</text>
    <text x="180" y="632" text-anchor="middle" font-size="10" fill="#047857">desayuno · comida · cena · snack</text>
  </g>
  <line x1="180" y1="644" x2="180" y2="664" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Box 4 -->
  <g filter="url(#soft)">
    <rect x="60" y="666" width="240" height="52" rx="8" ry="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
    <text x="180" y="689" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">4. Registrar en el día</text>
    <text x="180" y="706" text-anchor="middle" font-size="10" fill="#047857">guarda en local (ORMLite) + Firebase</text>
  </g>

  <!-- ===================== ZONA 2: REGISTRO DIARIO ===================== -->
  <rect x="340" y="395" width="240" height="340" rx="12" ry="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <rect x="340" y="395" width="240" height="34" rx="12" ry="12" fill="#d97706"/>
  <rect x="340" y="415" width="240" height="14" fill="#d97706"/>
  <text x="460" y="417" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">REGISTRO DIARIO</text>

  <!-- Distribuidor interno -->
  <line x1="460" y1="429" x2="460" y2="450" stroke="#d97706" stroke-width="1.6"/>
  <line x1="460" y1="450" x2="460" y2="470" stroke="#d97706" stroke-width="1.6" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="360" y="472" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.3"/>
    <text x="460" y="495" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Ver comidas del día</text>
    <text x="460" y="512" text-anchor="middle" font-size="10" fill="#b45309">listado agrupado por ingesta</text>
  </g>

  <line x1="460" y1="524" x2="460" y2="546" stroke="#d97706" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="360" y="548" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.3"/>
    <text x="460" y="571" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Editar cantidad</text>
    <text x="460" y="588" text-anchor="middle" font-size="10" fill="#b45309">recalcula kcal del día</text>
  </g>

  <line x1="460" y1="600" x2="460" y2="622" stroke="#d97706" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="360" y="624" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#fbbf24" stroke-width="1.3"/>
    <text x="460" y="647" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Eliminar comida</text>
    <text x="460" y="664" text-anchor="middle" font-size="10" fill="#b45309">resta kcal y sincroniza</text>
  </g>

  <!-- ===================== ZONA 3: HISTORIAL ===================== -->
  <rect x="620" y="395" width="240" height="340" rx="12" ry="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <rect x="620" y="395" width="240" height="34" rx="12" ry="12" fill="#7c3aed"/>
  <rect x="620" y="415" width="240" height="14" fill="#7c3aed"/>
  <text x="740" y="417" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">HISTORIAL Y SEGUIMIENTO</text>

  <line x1="740" y1="429" x2="740" y2="450" stroke="#7c3aed" stroke-width="1.6"/>
  <line x1="740" y1="450" x2="740" y2="470" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="640" y="472" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#a78bfa" stroke-width="1.3"/>
    <text x="740" y="495" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Ver días anteriores</text>
    <text x="740" y="512" text-anchor="middle" font-size="10" fill="#6d28d9">consulta por fecha</text>
  </g>

  <line x1="740" y1="524" x2="740" y2="546" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="640" y="548" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#a78bfa" stroke-width="1.3"/>
    <text x="740" y="571" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Estadísticas semana / mes</text>
    <text x="740" y="588" text-anchor="middle" font-size="10" fill="#6d28d9">gráfica de evolución</text>
  </g>

  <line x1="740" y1="600" x2="740" y2="622" stroke="#7c3aed" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="640" y="624" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#a78bfa" stroke-width="1.3"/>
    <text x="740" y="647" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Comparar con objetivo</text>
    <text x="740" y="664" text-anchor="middle" font-size="10" fill="#6d28d9">diferencia vs meta diaria</text>
  </g>

  <!-- ===================== ZONA 4: CUENTA ===================== -->
  <rect x="900" y="395" width="240" height="340" rx="12" ry="12" fill="#fff1f2" stroke="#fda4af" stroke-width="1"/>
  <rect x="900" y="395" width="240" height="34" rx="12" ry="12" fill="#e11d48"/>
  <rect x="900" y="415" width="240" height="14" fill="#e11d48"/>
  <text x="1020" y="417" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CUENTA</text>

  <line x1="1020" y1="429" x2="1020" y2="450" stroke="#e11d48" stroke-width="1.6"/>
  <line x1="1020" y1="450" x2="1020" y2="470" stroke="#e11d48" stroke-width="1.6" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="920" y="472" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#fb7185" stroke-width="1.3"/>
    <text x="1020" y="495" text-anchor="middle" font-size="12" font-weight="600" fill="#881337">Editar perfil</text>
    <text x="1020" y="512" text-anchor="middle" font-size="10" fill="#be123c">peso · altura · edad</text>
  </g>

  <line x1="1020" y1="524" x2="1020" y2="546" stroke="#e11d48" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="920" y="548" width="200" height="52" rx="8" ry="8" fill="#ffffff" stroke="#fb7185" stroke-width="1.3"/>
    <text x="1020" y="571" text-anchor="middle" font-size="12" font-weight="600" fill="#881337">Ajustar objetivo kcal</text>
    <text x="1020" y="588" text-anchor="middle" font-size="10" fill="#be123c">meta diaria</text>
  </g>

  <line x1="1020" y1="600" x2="1020" y2="622" stroke="#e11d48" stroke-width="1.6" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="920" y="624" width="200" height="52" rx="8" ry="8" fill="#fee2e2" stroke="#e11d48" stroke-width="1.6"/>
    <text x="1020" y="647" text-anchor="middle" font-size="12" font-weight="700" fill="#881337">Cerrar sesión</text>
    <text x="1020" y="664" text-anchor="middle" font-size="10" fill="#be123c">termina la sesión</text>
  </g>

  <!-- ===================== FIN ===================== -->
  <line x1="1020" y1="676" x2="1020" y2="756" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <g filter="url(#soft)">
    <rect x="955" y="758" width="130" height="44" rx="22" ry="22" fill="#0f172a"/>
    <text x="1020" y="785" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Fin</text>
  </g>

  <!-- ===================== FLECHAS DE RETORNO (punteadas al hub) ===================== -->
  <!-- Zona 1: desde box 4 (último paso) vuelve al hub -->
  <path d="M 60 692 C 20 692, 20 305, 370 305" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>
  <!-- Zona 2: vuelve al hub -->
  <path d="M 360 650 C 330 650, 330 345, 450 345" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>
  <!-- Zona 3: vuelve al hub -->
  <path d="M 840 650 C 870 650, 870 345, 750 345" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>
  <!-- Zona 4: desde Editar perfil / Objetivo (no desde Cerrar sesión) -->
  <path d="M 1120 574 C 1170 574, 1170 305, 830 305" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>

  <!-- ===================== LEYENDA ===================== -->
  <g transform="translate(40, 820)">
    <rect x="0" y="0" width="880" height="110" rx="10" ry="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#0f172a">Leyenda</text>

    <!-- Fila 1 -->
    <line x1="20" y1="50" x2="60" y2="50" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="70" y="54" font-size="11" fill="#475569">Navegación del usuario (acción siguiente)</text>

    <line x1="300" y1="50" x2="340" y2="50" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>
    <text x="350" y="54" font-size="11" fill="#475569">Retorno automático al dashboard</text>

    <rect x="570" y="42" width="18" height="14" rx="3" fill="url(#hubGrad)"/>
    <text x="594" y="54" font-size="11" fill="#475569">Pantalla principal (hub central)</text>

    <!-- Fila 2: zonas -->
    <rect x="20" y="72" width="14" height="14" rx="3" fill="#059669"/>
    <text x="40" y="84" font-size="11" fill="#475569">Añadir comida</text>

    <rect x="160" y="72" width="14" height="14" rx="3" fill="#d97706"/>
    <text x="180" y="84" font-size="11" fill="#475569">Registro diario</text>

    <rect x="300" y="72" width="14" height="14" rx="3" fill="#7c3aed"/>
    <text x="320" y="84" font-size="11" fill="#475569">Historial y seguimiento</text>

    <rect x="470" y="72" width="14" height="14" rx="3" fill="#e11d48"/>
    <text x="490" y="84" font-size="11" fill="#475569">Cuenta</text>

    <text x="20" y="102" font-size="10" fill="#64748b" font-style="italic">Los datos se guardan en local con ORMLite y se sincronizan con Firebase cuando hay conexión. La app funciona sin red salvo en la búsqueda de alimentos.</text>
  </g>
</svg>
