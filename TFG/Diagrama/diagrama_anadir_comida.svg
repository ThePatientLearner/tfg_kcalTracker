<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1700"
     font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowYes" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowNo" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1320" height="1700" fill="url(#bgGrad)"/>

  <!-- title block -->
  <rect x="0" y="0" width="1320" height="90" fill="url(#titleGrad)"/>
  <text x="660" y="44" text-anchor="middle" font-size="24" font-weight="700"
        fill="#ffffff">Diagrama de Actividad — Añadir Comida</text>
  <text x="660" y="70" text-anchor="middle" font-size="13" font-style="italic"
        fill="#cbd5e1">App de control de calorías · TFG · Android Java + Firebase + ORMlite</text>

  <!-- swimlane headers -->
  <g>
    <rect x="20" y="100" width="256" height="36" rx="4" fill="#64748b"/>
    <text x="148" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Usuario</text>

    <rect x="276" y="100" width="256" height="36" rx="4" fill="#2563eb"/>
    <text x="404" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">App Android (Java)</text>

    <rect x="532" y="100" width="256" height="36" rx="4" fill="#7c3aed"/>
    <text x="660" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">API de Comidas</text>

    <rect x="788" y="100" width="256" height="36" rx="4" fill="#16a34a"/>
    <text x="916" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">ORMlite (SQLite local)</text>

    <rect x="1044" y="100" width="256" height="36" rx="4" fill="#f59e0b"/>
    <text x="1172" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Firebase (Firestore)</text>
  </g>

  <!-- swimlane separators -->
  <g stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 4">
    <line x1="276" y1="140" x2="276" y2="1660"/>
    <line x1="532" y1="140" x2="532" y2="1660"/>
    <line x1="788" y1="140" x2="788" y2="1660"/>
    <line x1="1044" y1="140" x2="1044" y2="1660"/>
  </g>
  <line x1="20" y1="140" x2="20" y2="1660" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="1300" y1="140" x2="1300" y2="1660" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="20" y1="1660" x2="1300" y2="1660" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ============================ ACTIVITIES ============================ -->

  <!-- INICIO -->
  <circle cx="148" cy="170" r="14" fill="#0f172a"/>
  <line x1="148" y1="184" x2="148" y2="208" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A1 -->
  <g filter="url(#shadow)">
    <rect x="48" y="210" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="48" y="210" width="6" height="50" rx="3" fill="#64748b"/>
  </g>
  <text x="148" y="240" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Pulsar "Añadir comida"</text>
  <path d="M 148,260 V 285 H 304" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A2 -->
  <g filter="url(#shadow)">
    <rect x="304" y="285" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="304" y="285" width="6" height="50" rx="3" fill="#2563eb"/>
  </g>
  <text x="404" y="315" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Mostrar pantalla de búsqueda</text>
  <path d="M 404,335 V 360 H 148 V 365" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A3 -->
  <g filter="url(#shadow)">
    <rect x="48" y="365" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="48" y="365" width="6" height="50" rx="3" fill="#64748b"/>
  </g>
  <text x="148" y="389" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Introducir nombre del</text>
  <text x="148" y="405" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">alimento y pulsar "Buscar"</text>
  <path d="M 148,415 V 440 H 404 V 445" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- D1: ¿Hay conexión a Internet? -->
  <g filter="url(#shadow)">
    <polygon points="404,445 504,495 404,545 304,495" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="404" y="491" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350f">¿Hay conexión</text>
  <text x="404" y="506" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350f">a Internet?</text>

  <!-- Sí branch -->
  <line x1="404" y1="545" x2="404" y2="563" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowYes)"/>
  <text x="412" y="560" font-size="11" font-weight="700" fill="#16a34a">Sí</text>

  <!-- No branch loop back to A3 -->
  <path d="M 304,495 H 280 V 388 H 252" fill="none" stroke="#dc2626" stroke-width="2"
        stroke-dasharray="6 3" marker-end="url(#arrowNo)"/>
  <text x="298" y="487" text-anchor="end" font-size="11" font-weight="700" fill="#dc2626">No</text>
  <text x="262" y="446" font-size="10" font-style="italic" fill="#dc2626" transform="rotate(-90 262 446)">reintentar</text>

  <!-- A4 -->
  <g filter="url(#shadow)">
    <rect x="304" y="565" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="304" y="565" width="6" height="50" rx="3" fill="#2563eb"/>
  </g>
  <text x="404" y="589" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Solicitar búsqueda HTTPS</text>
  <text x="404" y="605" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">(Retrofit / OkHttp)</text>
  <path d="M 504,590 H 660 V 645" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A5 -->
  <g filter="url(#shadow)">
    <rect x="560" y="645" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="560" y="645" width="6" height="50" rx="3" fill="#7c3aed"/>
  </g>
  <text x="660" y="675" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Procesar consulta</text>
  <line x1="660" y1="695" x2="660" y2="723" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A6 -->
  <g filter="url(#shadow)">
    <rect x="560" y="725" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="560" y="725" width="6" height="50" rx="3" fill="#7c3aed"/>
  </g>
  <text x="660" y="749" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Devolver lista de alimentos</text>
  <text x="660" y="765" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">JSON (nombre, kcal/100 g)</text>
  <path d="M 560,750 H 504 V 805" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A7 -->
  <g filter="url(#shadow)">
    <rect x="304" y="805" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="304" y="805" width="6" height="50" rx="3" fill="#2563eb"/>
  </g>
  <text x="404" y="835" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Mostrar lista de resultados</text>
  <path d="M 404,855 V 880 H 148 V 885" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A8 -->
  <g filter="url(#shadow)">
    <rect x="48" y="885" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="48" y="885" width="6" height="50" rx="3" fill="#64748b"/>
  </g>
  <text x="148" y="915" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Seleccionar alimento</text>
  <line x1="148" y1="935" x2="148" y2="963" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A9 -->
  <g filter="url(#shadow)">
    <rect x="48" y="965" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="48" y="965" width="6" height="50" rx="3" fill="#64748b"/>
  </g>
  <text x="148" y="995" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Introducir cantidad (g)</text>
  <path d="M 148,1015 V 1040 H 404 V 1045" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A10 -->
  <g filter="url(#shadow)">
    <rect x="304" y="1045" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="304" y="1045" width="6" height="50" rx="3" fill="#2563eb"/>
  </g>
  <text x="404" y="1069" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Calcular kcal totales</text>
  <text x="404" y="1085" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">(kcal/100 g) × cantidad</text>
  <path d="M 404,1095 V 1120 H 148 V 1125" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A11 -->
  <g filter="url(#shadow)">
    <rect x="48" y="1125" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="48" y="1125" width="6" height="50" rx="3" fill="#64748b"/>
  </g>
  <text x="148" y="1155" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Confirmar "Añadir"</text>
  <path d="M 148,1175 V 1200 H 916 V 1205" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A12 -->
  <g filter="url(#shadow)">
    <rect x="816" y="1205" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="816" y="1205" width="6" height="50" rx="3" fill="#16a34a"/>
  </g>
  <text x="916" y="1229" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Guardar comida en SQLite</text>
  <text x="916" y="1245" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">(persistencia local)</text>
  <path d="M 916,1255 V 1290 H 404 V 1295" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- D2: ¿Conexión activa? -->
  <g filter="url(#shadow)">
    <polygon points="404,1295 504,1345 404,1395 304,1345" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  </g>
  <text x="404" y="1341" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350f">¿Conexión</text>
  <text x="404" y="1357" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350f">activa?</text>

  <!-- Sí branch from D2 to Firestore (lane 5) -->
  <path d="M 504,1345 H 1172 V 1410" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowYes)"/>
  <text x="540" y="1338" font-size="11" font-weight="700" fill="#16a34a">Sí</text>

  <!-- No branch from D2 to Marcar pendiente (lane 4) -->
  <path d="M 404,1395 V 1410 H 916" fill="none" stroke="#dc2626" stroke-width="2"
        stroke-dasharray="6 3" marker-end="url(#arrowNo)"/>
  <text x="412" y="1408" font-size="11" font-weight="700" fill="#dc2626">No</text>

  <!-- A13: Almacenar en Firestore -->
  <g filter="url(#shadow)">
    <rect x="1072" y="1410" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="1072" y="1410" width="6" height="50" rx="3" fill="#f59e0b"/>
  </g>
  <text x="1172" y="1434" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Almacenar en Firestore</text>
  <text x="1172" y="1450" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">/users/{uid}/meals</text>

  <!-- A14: Marcar como pendiente -->
  <g filter="url(#shadow)">
    <rect x="816" y="1410" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="816" y="1410" width="6" height="50" rx="3" fill="#16a34a"/>
  </g>
  <text x="916" y="1434" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Marcar como pendiente</text>
  <text x="916" y="1450" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">(sync diferido)</text>

  <!-- Merge node: hollow diamond at (404, 1490) -->
  <line x1="1172" y1="1460" x2="1172" y2="1490" stroke="#334155" stroke-width="2"/>
  <line x1="916"  y1="1460" x2="916"  y2="1490" stroke="#334155" stroke-width="2"/>
  <line x1="416"  y1="1490" x2="1172" y2="1490" stroke="#334155" stroke-width="2"/>
  <polygon points="404,1480 416,1490 404,1500 392,1490" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <line x1="416" y1="1490" x2="918" y2="1490" stroke="#334155" stroke-width="2"/>
  <!-- arrow from merge to A15 -->
  <line x1="404" y1="1500" x2="404" y2="1525" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A15: Actualizar dashboard -->
  <g filter="url(#shadow)">
    <rect x="304" y="1525" width="200" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="304" y="1525" width="6" height="50" rx="3" fill="#2563eb"/>
  </g>
  <text x="404" y="1549" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0f172a">Actualizar dashboard del día</text>
  <text x="404" y="1565" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">kcal acumuladas + comidas</text>

  <!-- arrow A15 -> Fin -->
  <path d="M 404,1575 V 1605 H 148 V 1610" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FIN: bullseye -->
  <circle cx="148" cy="1626" r="14" fill="none" stroke="#0f172a" stroke-width="2"/>
  <circle cx="148" cy="1626" r="8" fill="#0f172a"/>

</svg>
