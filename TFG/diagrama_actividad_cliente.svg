<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1620" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <style>
    .action { fill: #ffffff; stroke: #334155; stroke-width: 1.4; }
    .action-hub { fill: #dbeafe; stroke: #1e40af; stroke-width: 1.8; }
    .decision { fill: #fef9c3; stroke: #b45309; stroke-width: 1.5; }
    .merge { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.2; }
    .flow { stroke: #334155; stroke-width: 1.6; fill: none; }
    .flowLoop { stroke: #0f766e; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; }
    .t { font-size: 12px; fill: #0f172a; }
    .ts { font-size: 11px; fill: #0f172a; }
    .tn { font-size: 10px; fill: #64748b; }
    .td { font-size: 11.5px; font-weight: 600; fill: #78350f; }
    .guard { font-size: 10.5px; fill: #334155; font-style: italic; }
    .guard-bg { fill: #f8fafc; }
    .branch-hd { font-size: 12px; font-weight: 700; }
  </style>

  <rect width="1800" height="1620" fill="#f8fafc"/>

  <!-- ================== TÍTULO ================== -->
  <text x="900" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Diagrama de actividad — Cliente de la aplicación de kcal</text>
  <text x="900" y="58" text-anchor="middle" font-size="12" fill="#64748b">Notación UML · nodo inicial, acciones, decisiones, merges y nodo final</text>

  <!-- ================== ACCESO ================== -->
  <!-- Nodo inicial -->
  <circle cx="900" cy="85" r="9" fill="#0f172a"/>
  <line x1="900" y1="94" x2="900" y2="114" class="flow" marker-end="url(#arr)"/>

  <!-- Abrir aplicación -->
  <rect x="820" y="116" width="160" height="40" rx="20" ry="20" class="action"/>
  <text x="900" y="141" text-anchor="middle" class="t">Abrir aplicación</text>
  <line x1="900" y1="156" x2="900" y2="176" class="flow" marker-end="url(#arr)"/>

  <!-- ¿Tiene cuenta? -->
  <polygon points="900,178 990,222 900,266 810,222" class="decision"/>
  <text x="900" y="218" text-anchor="middle" class="td">¿Tiene cuenta</text>
  <text x="900" y="234" text-anchor="middle" class="td">de usuario?</text>

  <!-- Guarda [no] -->
  <path d="M 810 222 L 740 222 L 740 262" class="flow" marker-end="url(#arr)"/>
  <rect x="752" y="208" width="32" height="15" class="guard-bg"/>
  <text x="768" y="220" text-anchor="middle" class="guard">[no]</text>

  <!-- Guarda [sí] -->
  <path d="M 990 222 L 1060 222 L 1060 262" class="flow" marker-end="url(#arr)"/>
  <rect x="1016" y="208" width="30" height="15" class="guard-bg"/>
  <text x="1031" y="220" text-anchor="middle" class="guard">[sí]</text>

  <!-- Registrarse -->
  <rect x="660" y="264" width="160" height="40" rx="20" ry="20" class="action"/>
  <text x="740" y="289" text-anchor="middle" class="t">Registrarse</text>
  <line x1="740" y1="304" x2="740" y2="324" class="flow" marker-end="url(#arr)"/>

  <!-- Configurar perfil -->
  <rect x="640" y="326" width="200" height="48" rx="24" ry="24" class="action"/>
  <text x="740" y="347" text-anchor="middle" class="t">Configurar perfil inicial</text>
  <text x="740" y="363" text-anchor="middle" class="tn">edad · peso · altura · objetivo</text>

  <!-- Iniciar sesión -->
  <rect x="980" y="264" width="160" height="40" rx="20" ry="20" class="action"/>
  <text x="1060" y="289" text-anchor="middle" class="t">Iniciar sesión</text>

  <!-- Merge auth -->
  <polygon points="900,400 925,425 900,450 875,425" class="merge"/>
  <path d="M 740 374 L 740 425 L 875 425" class="flow" marker-end="url(#arr)"/>
  <path d="M 1060 304 L 1060 425 L 925 425" class="flow" marker-end="url(#arr)"/>
  <line x1="900" y1="450" x2="900" y2="472" class="flow" marker-end="url(#arr)"/>

  <!-- Mostrar dashboard -->
  <rect x="770" y="474" width="260" height="50" rx="25" ry="25" class="action-hub"/>
  <text x="900" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Mostrar dashboard</text>
  <text x="900" y="512" text-anchor="middle" font-size="10.5" fill="#1e3a8a">kcal día / objetivo / restantes</text>
  <line x1="900" y1="524" x2="900" y2="544" class="flow" marker-end="url(#arr)"/>

  <!-- Merge de retorno (bucle) -->
  <polygon points="900,546 925,571 900,596 875,571" class="merge"/>
  <text x="866" y="574" text-anchor="end" class="tn" font-style="italic">retorno de acciones</text>
  <line x1="900" y1="596" x2="900" y2="618" class="flow" marker-end="url(#arr)"/>

  <!-- ================== DECISIÓN PRINCIPAL ================== -->
  <polygon points="900,620 1060,680 900,740 740,680" class="decision"/>
  <text x="900" y="676" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">¿Qué acción</text>
  <text x="900" y="694" text-anchor="middle" font-size="14" font-weight="700" fill="#78350f">desea realizar?</text>

  <!-- ================== FAN-OUT A 5 RAMAS (distribuidor con guardas) ================== -->
  <!-- Eje del distribuidor -->
  <line x1="900" y1="740" x2="900" y2="760" class="flow"/>
  <line x1="220" y1="760" x2="1650" y2="760" class="flow"/>

  <!-- Drop-downs a cada rama -->
  <line x1="220" y1="760" x2="220" y2="790" class="flow" marker-end="url(#arr)"/>
  <line x1="610" y1="760" x2="610" y2="790" class="flow" marker-end="url(#arr)"/>
  <line x1="980" y1="760" x2="980" y2="790" class="flow" marker-end="url(#arr)"/>
  <line x1="1340" y1="760" x2="1340" y2="790" class="flow" marker-end="url(#arr)"/>
  <line x1="1650" y1="760" x2="1650" y2="790" class="flow" marker-end="url(#arr)"/>

  <!-- Guardas sobre los segmentos horizontales -->
  <rect x="390" y="748" width="120" height="16" class="guard-bg"/>
  <text x="450" y="760" text-anchor="middle" class="guard">[añadir comida]</text>

  <rect x="730" y="748" width="115" height="16" class="guard-bg"/>
  <text x="788" y="760" text-anchor="middle" class="guard">[ver registro]</text>

  <rect x="1000" y="748" width="100" height="16" class="guard-bg"/>
  <text x="1050" y="760" text-anchor="middle" class="guard">[ver historial]</text>

  <rect x="1170" y="748" width="115" height="16" class="guard-bg"/>
  <text x="1228" y="760" text-anchor="middle" class="guard">[editar cuenta]</text>

  <rect x="1460" y="748" width="115" height="16" class="guard-bg"/>
  <text x="1518" y="760" text-anchor="middle" class="guard">[cerrar sesión]</text>

  <!-- ================== CABECERAS DE RAMAS ================== -->
  <text x="220" y="815" text-anchor="middle" class="branch-hd" fill="#059669">RAMA A · AÑADIR COMIDA</text>
  <text x="610" y="815" text-anchor="middle" class="branch-hd" fill="#d97706">RAMA B · REGISTRO DIARIO</text>
  <text x="980" y="815" text-anchor="middle" class="branch-hd" fill="#7c3aed">RAMA C · HISTORIAL</text>
  <text x="1340" y="815" text-anchor="middle" class="branch-hd" fill="#e11d48">RAMA D · CUENTA</text>
  <text x="1650" y="815" text-anchor="middle" class="branch-hd" fill="#0f172a">RAMA E · CERRAR SESIÓN</text>

  <!-- ================== RAMA A: AÑADIR COMIDA ================== -->
  <!-- Caja principal -->
  <rect x="110" y="835" width="220" height="44" rx="22" ry="22" class="action"/>
  <text x="220" y="861" text-anchor="middle" class="t">Buscar alimento en API</text>
  <line x1="220" y1="879" x2="220" y2="900" class="flow" marker-end="url(#arr)"/>

  <!-- Decisión ¿Encontrado? -->
  <polygon points="220,902 290,945 220,988 150,945" class="decision"/>
  <text x="220" y="942" text-anchor="middle" class="td">¿Encontrado</text>
  <text x="220" y="958" text-anchor="middle" class="td">en la API?</text>

  <!-- [no] hacia la izquierda -->
  <path d="M 150 945 L 100 945 L 100 1010" class="flow" marker-end="url(#arr)"/>
  <rect x="110" y="935" width="32" height="15" class="guard-bg"/>
  <text x="126" y="947" text-anchor="middle" class="guard">[no]</text>

  <rect x="40" y="1012" width="130" height="44" rx="22" ry="22" class="action"/>
  <text x="105" y="1031" text-anchor="middle" class="ts">Notificar</text>
  <text x="105" y="1047" text-anchor="middle" class="tn">no encontrado</text>

  <!-- [sí] hacia la derecha -->
  <path d="M 290 945 L 340 945 L 340 1010" class="flow" marker-end="url(#arr)"/>
  <rect x="297" y="935" width="30" height="15" class="guard-bg"/>
  <text x="312" y="947" text-anchor="middle" class="guard">[sí]</text>

  <rect x="270" y="1012" width="140" height="44" rx="22" ry="22" class="action"/>
  <text x="340" y="1038" text-anchor="middle" class="ts">Seleccionar alimento</text>
  <line x1="340" y1="1056" x2="340" y2="1078" class="flow" marker-end="url(#arr)"/>

  <rect x="270" y="1080" width="140" height="44" rx="22" ry="22" class="action"/>
  <text x="340" y="1106" text-anchor="middle" class="ts">Indicar cantidad (g)</text>
  <line x1="340" y1="1124" x2="340" y2="1146" class="flow" marker-end="url(#arr)"/>

  <rect x="270" y="1148" width="140" height="44" rx="22" ry="22" class="action"/>
  <text x="340" y="1174" text-anchor="middle" class="ts">Clasificar ingesta</text>
  <line x1="340" y1="1192" x2="340" y2="1214" class="flow" marker-end="url(#arr)"/>

  <rect x="265" y="1216" width="150" height="48" rx="24" ry="24" class="action"/>
  <text x="340" y="1236" text-anchor="middle" class="ts">Guardar comida</text>
  <text x="340" y="1252" text-anchor="middle" class="tn">ORMLite + Firebase</text>

  <!-- Merge rama A -->
  <polygon points="220,1300 245,1325 220,1350 195,1325" class="merge"/>
  <path d="M 105 1056 L 105 1325 L 195 1325" class="flow" marker-end="url(#arr)"/>
  <path d="M 340 1264 L 340 1325 L 245 1325" class="flow" marker-end="url(#arr)"/>

  <!-- ================== RAMA B: REGISTRO DIARIO ================== -->
  <rect x="500" y="835" width="220" height="44" rx="22" ry="22" class="action"/>
  <text x="610" y="861" text-anchor="middle" class="t">Ver comidas del día</text>
  <line x1="610" y1="879" x2="610" y2="900" class="flow" marker-end="url(#arr)"/>

  <!-- Decisión ¿Acción sobre comida? -->
  <polygon points="610,902 700,945 610,988 520,945" class="decision"/>
  <text x="610" y="942" text-anchor="middle" class="td">¿Acción</text>
  <text x="610" y="958" text-anchor="middle" class="td">sobre comida?</text>

  <!-- [editar] izquierda -->
  <path d="M 520 945 L 490 945 L 490 1010" class="flow" marker-end="url(#arr)"/>
  <rect x="450" y="935" width="52" height="15" class="guard-bg"/>
  <text x="476" y="947" text-anchor="middle" class="guard">[editar]</text>

  <rect x="430" y="1012" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="490" y="1031" text-anchor="middle" class="ts">Editar</text>
  <text x="490" y="1047" text-anchor="middle" class="tn">cantidad</text>

  <!-- [eliminar] derecha -->
  <path d="M 700 945 L 730 945 L 730 1010" class="flow" marker-end="url(#arr)"/>
  <rect x="718" y="935" width="65" height="15" class="guard-bg"/>
  <text x="750" y="947" text-anchor="middle" class="guard">[eliminar]</text>

  <rect x="670" y="1012" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="730" y="1031" text-anchor="middle" class="ts">Eliminar</text>
  <text x="730" y="1047" text-anchor="middle" class="tn">comida</text>

  <!-- [ninguna] centro -->
  <path d="M 610 988 L 610 1320" class="flow"/>
  <rect x="578" y="1000" width="65" height="15" class="guard-bg"/>
  <text x="610" y="1012" text-anchor="middle" class="guard">[ninguna]</text>

  <!-- Merge rama B -->
  <polygon points="610,1300 635,1325 610,1350 585,1325" class="merge"/>
  <path d="M 490 1056 L 490 1325 L 585 1325" class="flow" marker-end="url(#arr)"/>
  <path d="M 730 1056 L 730 1325 L 635 1325" class="flow" marker-end="url(#arr)"/>

  <!-- ================== RAMA C: HISTORIAL ================== -->
  <!-- Decisión (primer elemento) -->
  <polygon points="980,835 1090,890 980,945 870,890" class="decision"/>
  <text x="980" y="886" text-anchor="middle" class="td">¿Tipo de</text>
  <text x="980" y="902" text-anchor="middle" class="td">consulta?</text>

  <!-- [día] izquierda -->
  <path d="M 870 890 L 840 890 L 840 968" class="flow" marker-end="url(#arr)"/>
  <rect x="816" y="880" width="42" height="15" class="guard-bg"/>
  <text x="837" y="892" text-anchor="middle" class="guard">[día]</text>

  <rect x="780" y="970" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="840" y="989" text-anchor="middle" class="ts">Seleccionar</text>
  <text x="840" y="1005" text-anchor="middle" class="tn">fecha</text>
  <line x1="840" y1="1014" x2="840" y2="1038" class="flow" marker-end="url(#arr)"/>

  <rect x="780" y="1040" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="840" y="1066" text-anchor="middle" class="ts">Ver día anterior</text>

  <!-- [estadísticas] derecha -->
  <path d="M 1090 890 L 1120 890 L 1120 968" class="flow" marker-end="url(#arr)"/>
  <rect x="1104" y="880" width="86" height="15" class="guard-bg"/>
  <text x="1147" y="892" text-anchor="middle" class="guard">[estadísticas]</text>

  <rect x="1060" y="970" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="1120" y="989" text-anchor="middle" class="ts">Ver gráfica</text>
  <text x="1120" y="1005" text-anchor="middle" class="tn">semana / mes</text>

  <!-- Merge rama C -->
  <polygon points="980,1300 1005,1325 980,1350 955,1325" class="merge"/>
  <path d="M 840 1084 L 840 1325 L 955 1325" class="flow" marker-end="url(#arr)"/>
  <path d="M 1120 1014 L 1120 1325 L 1005 1325" class="flow" marker-end="url(#arr)"/>

  <!-- ================== RAMA D: CUENTA ================== -->
  <polygon points="1340,835 1450,890 1340,945 1230,890" class="decision"/>
  <text x="1340" y="886" text-anchor="middle" class="td">¿Qué</text>
  <text x="1340" y="902" text-anchor="middle" class="td">editar?</text>

  <!-- [perfil] izquierda -->
  <path d="M 1230 890 L 1200 890 L 1200 968" class="flow" marker-end="url(#arr)"/>
  <rect x="1175" y="880" width="52" height="15" class="guard-bg"/>
  <text x="1201" y="892" text-anchor="middle" class="guard">[perfil]</text>

  <rect x="1140" y="970" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="1200" y="989" text-anchor="middle" class="ts">Editar datos</text>
  <text x="1200" y="1005" text-anchor="middle" class="tn">personales</text>

  <!-- [objetivo] derecha -->
  <path d="M 1450 890 L 1480 890 L 1480 968" class="flow" marker-end="url(#arr)"/>
  <rect x="1466" y="880" width="68" height="15" class="guard-bg"/>
  <text x="1500" y="892" text-anchor="middle" class="guard">[objetivo]</text>

  <rect x="1420" y="970" width="120" height="44" rx="22" ry="22" class="action"/>
  <text x="1480" y="989" text-anchor="middle" class="ts">Modificar</text>
  <text x="1480" y="1005" text-anchor="middle" class="tn">objetivo kcal</text>

  <!-- Merge intermedio D -->
  <polygon points="1340,1060 1365,1085 1340,1110 1315,1085" class="merge"/>
  <path d="M 1200 1014 L 1200 1085 L 1315 1085" class="flow" marker-end="url(#arr)"/>
  <path d="M 1480 1014 L 1480 1085 L 1365 1085" class="flow" marker-end="url(#arr)"/>
  <line x1="1340" y1="1110" x2="1340" y2="1132" class="flow" marker-end="url(#arr)"/>

  <!-- Guardar cambios -->
  <rect x="1240" y="1134" width="200" height="48" rx="24" ry="24" class="action"/>
  <text x="1340" y="1155" text-anchor="middle" class="t">Guardar cambios</text>
  <text x="1340" y="1171" text-anchor="middle" class="tn">ORMLite + Firebase</text>

  <!-- Merge rama D (para unificar salida con las demás) -->
  <polygon points="1340,1300 1365,1325 1340,1350 1315,1325" class="merge"/>
  <line x1="1340" y1="1182" x2="1340" y2="1325" class="flow" marker-end="url(#arr)"/>

  <!-- ================== RAMA E: CERRAR SESIÓN ================== -->
  <rect x="1560" y="835" width="180" height="48" rx="24" ry="24" class="action"/>
  <text x="1650" y="856" text-anchor="middle" class="t">Cerrar sesión</text>
  <text x="1650" y="872" text-anchor="middle" class="tn">Firebase Auth</text>
  <line x1="1650" y1="883" x2="1650" y2="915" class="flow" marker-end="url(#arr)"/>

  <!-- Nodo final (diana) -->
  <circle cx="1650" cy="935" r="14" fill="none" stroke="#0f172a" stroke-width="1.8"/>
  <circle cx="1650" cy="935" r="8" fill="#0f172a"/>

  <!-- ================== MERGE GLOBAL + BUCLE ================== -->
  <!-- Merge global grande -->
  <polygon points="900,1390 950,1425 900,1460 850,1425" class="merge"/>
  <text x="900" y="1430" text-anchor="middle" class="tn" font-style="italic">merge global</text>

  <!-- Flechas de cada rama al merge global -->
  <path d="M 220 1350 L 220 1425 L 850 1425" class="flow" marker-end="url(#arr)"/>
  <path d="M 610 1350 L 610 1425 L 850 1425" class="flow"/>
  <path d="M 980 1350 L 980 1425 L 950 1425" class="flow" marker-end="url(#arr)"/>
  <path d="M 1340 1350 L 1340 1425 L 950 1425" class="flow"/>

  <!-- Salida del merge global → bucle de retorno -->
  <line x1="900" y1="1460" x2="900" y2="1485" class="flow"/>

  <!-- Bucle que sube por la izquierda y vuelve al merge de retorno -->
  <path d="M 900 1485 L 30 1485 L 30 571 L 875 571" class="flowLoop" marker-end="url(#arrLoop)"/>
  <rect x="18" y="1020" width="50" height="16" class="guard-bg"/>
  <text x="43" y="1032" text-anchor="middle" class="guard" fill="#0f766e">[loop]</text>

  <!-- ================== LEYENDA ================== -->
  <g transform="translate(40, 1510)">
    <rect x="0" y="0" width="1720" height="90" rx="10" ry="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#0f172a">Leyenda — notación UML de actividades</text>

    <!-- Fila única -->
    <circle cx="40" cy="58" r="7" fill="#0f172a"/>
    <text x="56" y="62" class="ts">Nodo inicial</text>

    <circle cx="170" cy="58" r="10" fill="none" stroke="#0f172a" stroke-width="1.6"/>
    <circle cx="170" cy="58" r="5.5" fill="#0f172a"/>
    <text x="188" y="62" class="ts">Nodo final</text>

    <rect x="290" y="46" width="90" height="26" rx="13" ry="13" class="action"/>
    <text x="335" y="63" text-anchor="middle" class="ts">Acción</text>

    <polygon points="480,46 520,61 480,76 440,61" class="decision"/>
    <text x="480" y="65" text-anchor="middle" class="td">Decisión</text>

    <polygon points="620,48 637,61 620,74 603,61" class="merge"/>
    <text x="648" y="65" class="ts">Merge</text>

    <line x1="730" y1="61" x2="810" y2="61" class="flow" marker-end="url(#arr)"/>
    <text x="820" y="65" class="ts">Flujo de control</text>

    <line x1="970" y1="61" x2="1050" y2="61" class="flowLoop" marker-end="url(#arrLoop)"/>
    <text x="1060" y="65" class="ts">Bucle de retorno al dashboard</text>

    <rect x="1310" y="53" width="55" height="16" class="guard-bg" stroke="#cbd5e1"/>
    <text x="1337" y="65" text-anchor="middle" class="guard">[guarda]</text>
    <text x="1375" y="65" class="ts">Condición de salida de una decisión</text>
  </g>
</svg>
